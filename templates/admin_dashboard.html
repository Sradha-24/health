<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div style="width: 80%;">
        <h1>Admin Dashboard</h1>
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
            </tr>
            {% for i in users %}
            <tr>
                <td>{{ i['id'] }}</td>
                <td>{{ i['name'] }}</td>
                <td>{{ i['email'] }}</td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <a href="/login">Logout</a>
    </div>
</body>
</html>
